services:
  mongo:
    image: mongo:7
    container_name: chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: chat-backend
    ports:
      - "5014:5014"
    environment:
      PORT: 5014
      MONGO_URI: mongodb://mongo:27017/chatapp
    depends_on:
      - mongo

volumes:
  mongo_data: