server {
    listen 80; # Listen on port 80 inside the container
    server_name localhost; # Server name

    root /usr/share/nginx/html; # Folder that contains the built frontend files
    index index.html; # Default file to serve

    location / {
        try_files $uri /index.html; 
        # If a file is not found, return index.html
        # This is needed for React routing
    }

    location /socket.io/ {
        proxy_pass http://backend:5014/socket.io/; 
        # Forward Socket.IO requests to the backend service

        proxy_http_version 1.1; 
        # Use HTTP 1.1 for WebSocket support

        proxy_set_header Upgrade $http_upgrade; 
        # Allow protocol upgrade for WebSocket

        proxy_set_header Connection "Upgrade"; 
        # Keep WebSocket connection alive

        proxy_set_header Host $host; 
        # Forward original host information
    }
}